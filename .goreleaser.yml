version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    binary: cloudcomply

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

# SHA256 checksums file — verify binary integrity before running
checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# SBOM — one per binary, CycloneDX format (widely supported by vulnerability scanners)
sboms:
  - artifacts: binary
    args: ["$artifact", "--output", "cyclonedx-json=$document"]

# Sign checksums file and SBOMs with cosign (keyless — no key management needed)
# Verification: cosign verify-blob --certificate-identity-regexp '.*' --certificate-oidc-issuer https://token.actions.githubusercontent.com <file>
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    args:
      - sign-blob
      - --yes
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - ${artifact}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: willj4945
    name: cloudcomply
  draft: false
  prerelease: auto  # tags like v1.0.0-beta are marked as pre-release automatically
